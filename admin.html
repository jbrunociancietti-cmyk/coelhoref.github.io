<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coelho Style | Painel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#1a1a1a;color:#fff;overflow-x:hidden}
:root{--primary:#ff1744;--gold:#ffd700;--accent:#111;--text:#fff;--red:#ff4444}

.container{max-width:1400px;margin:0 auto;padding:20px}

.header{background:linear-gradient(135deg,var(--primary),var(--gold));padding:40px;border-radius:20px;margin-bottom:40px;box-shadow:0 20px 60px rgba(255,23,68,0.3)}
.header h1{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:3px;color:#000;margin-bottom:10px}
.header p{color:#000;opacity:0.8;font-size:1.1rem}
.header a{color:#000;text-decoration:underline;font-weight:600}

.tabs{display:flex;gap:10px;margin-bottom:40px;flex-wrap:wrap;border-bottom:2px solid var(--gold);padding-bottom:20px}
.tab-btn{padding:12px 30px;background:transparent;color:var(--gold);border:2px solid var(--gold);border-radius:10px;cursor:pointer;font-weight:600;transition:all 0.3s;font-size:14px}
.tab-btn:hover,.tab-btn.active{background:var(--primary);color:#000;border-color:var(--primary)}

.tab-content{display:none}
.tab-content.active{display:block}

.editor-section{background:#222;padding:30px;border-radius:15px;margin-bottom:30px;border:1px solid var(--gold)}
.section-title{font-family:'Bebas Neue';font-size:1.8rem;color:var(--primary);margin-bottom:20px;letter-spacing:2px}

.form-group{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.form-group label{font-weight:600;color:#ccc;min-width:120px;font-size:14px}
.form-group input,.form-group select{padding:12px 15px;background:#333;border:1px solid var(--gold);border-radius:10px;color:var(--text);font-size:14px;flex:1;min-width:200px}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 15px rgba(255,23,68,0.2)}
.form-group textarea{padding:12px 15px;background:#333;border:1px solid var(--gold);border-radius:10px;color:var(--text);font-size:14px;width:100%;min-height:150px;font-family:'Poppins',sans-serif}

.btn-group{display:flex;gap:15px;flex-wrap:wrap}
.btn{padding:12px 30px;border:none;border-radius:10px;font-family:'Bebas Neue';font-weight:600;cursor:pointer;font-size:14px;transition:all 0.3s;letter-spacing:1px}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--red));color:#000}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(255,23,68,0.4)}
.btn-success{background:#28a745;color:#fff}
.btn-success:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(40,167,69,0.4)}
.btn-warning{background:#ffc107;color:#000}
.btn-danger{background:#dc3545;color:#fff}

.products-list{display:grid;gap:20px}
.product-item{background:#333;padding:20px;border-radius:10px;border-left:4px solid var(--primary);display:flex;gap:20px;align-items:flex-start}
.product-img{width:120px;height:120px;border-radius:10px;object-fit:cover;background:#444}
.product-info{flex:1}
.product-name{font-family:'Bebas Neue';font-size:1.3rem;color:var(--gold);margin-bottom:5px}
.product-details{font-size:13px;color:#ccc;margin-bottom:10px}
.product-actions{display:flex;gap:10px;}
.btn-small{padding:8px 15px;font-size:12px}

.settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-bottom:30px}
.setting-card{background:#333;padding:20px;border-radius:10px;border:1px solid #555}
.setting-name{font-family:'Bebas Neue';font-size:1.2rem;color:var(--primary);margin-bottom:15px}
.setting-desc{font-size:13px;color:#aaa;margin-bottom:15px}

.alert{padding:15px 20px;border-radius:10px;margin-bottom:20px;border-left:4px solid;font-size:14px}
.alert-success{background:#d4edda;color:#155724;border-color:#28a745}
.alert-warning{background:#fff3cd;color:#856404;border-color:#ffc107}

@media(max-width:768px){
.header{padding:20px}
.header h1{font-size:1.8rem}
.form-group{flex-direction:column}
.form-group label{min-width:auto;margin-bottom:5px}
.product-item{flex-direction:column;text-align:center}
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1><i class="fas fa-cog"></i> Painel de Admin</h1>
    <p><a href="index.html">← Voltar para a Loja Pública</a></p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="changeTab('produtos')"><i class="fas fa-box"></i> Produtos</button>
    <button class="tab-btn" onclick="changeTab('layout')"><i class="fas fa-palette"></i> Layout</button>
    <button class="tab-btn" onclick="changeTab('configs')"><i class="fas fa-sliders-h"></i> Configurações</button>
  </div>

  <!-- TAB 1: PRODUTOS -->
  <div class="tab-content active" id="tab-produtos">
    <button class="btn btn-primary" style="margin-bottom:20px" onclick="showNewProductForm()"><i class="fas fa-plus"></i> Novo Produto</button>
    <div id="productsList" class="products-list">Carregando...</div>
  </div>

  <!-- TAB 2: LAYOUT -->
  <div class="tab-content" id="tab-layout">
    <div class="editor-section">
      <div class="section-title">Cores da Marca</div>
      <div class="form-group">
        <label>Cor Primária:</label>
        <input type="color" id="colorPrimary" value="#ff1744">
      </div>
      <div class="form-group">
        <label>Cor Ouro:</label>
        <input type="color" id="colorGold" value="#ffd700">
      </div>
      <button class="btn btn-primary" onclick="updateColors()"><i class="fas fa-save"></i> Salvar</button>
      <div id="colorAlert"></div>
    </div>

    <div class="editor-section">
      <div class="section-title">Hero Section</div>
      <div class="form-group">
        <label>Título:</label>
        <input type="text" id="heroTitle" value="Coelho Style">
      </div>
      <div class="form-group">
        <label>Subtítulo:</label>
        <input type="text" id="heroSubtitle" value="Streetwear urbano com atitude 🐰">
      </div>
      <button class="btn btn-primary" onclick="updateHero()"><i class="fas fa-save"></i> Salvar</button>
      <div id="heroAlert"></div>
    </div>
  </div>

  <!-- TAB 3: CONFIGURAÇÕES -->
  <div class="tab-content" id="tab-configs">
    <div class="settings-grid">
      <div class="setting-card">
        <div class="setting-name"><i class="fas fa-store"></i> Loja</div>
        <div class="setting-desc">Nome do establishment</div>
        <div class="form-group" style="margin-bottom:0">
          <label>Nome:</label>
          <input type="text" id="storeName" value="Coelho Style">
        </div>
        <button class="btn btn-success" style="margin-top:15px;width:100%" onclick="saveSettings()"><i class="fas fa-check"></i> Salvar</button>
      </div>

      <div class="setting-card">
        <div class="setting-name"><i class="fas fa-list"></i> Categorias</div>
        <div class="setting-desc">Categorias de produtos</div>
        <div class="form-group" style="margin-bottom:0">
          <textarea id="categories" placeholder="camiseta,shorts,frio,tenis,chinelo" style="width:100%;min-height:80px">camiseta,shorts,frio,tenis,chinelo</textarea>
        </div>
        <button class="btn btn-success" style="margin-top:15px;width:100%" onclick="updateCategories()"><i class="fas fa-check"></i> Salvar</button>
        <div id="catAlert"></div>
      </div>

      <div class="setting-card">
        <div class="setting-name"><i class="fas fa-download"></i> Backup</div>
        <div class="setting-desc">Exportar/Resetar dados</div>
        <button class="btn btn-warning" style="width:100%;margin-bottom:10px" onclick="exportData()"><i class="fas fa-download"></i> Exportar</button>
        <button class="btn btn-danger" style="width:100%" onclick="resetAll()"><i class="fas fa-redo"></i> Resetar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL NOVO PRODUTO -->
<div id="productModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.98);z-index:9000;overflow-y:auto;padding:50px 20px">
  <div style="max-width:600px;margin:0 auto;background:#222;padding:40px;border-radius:20px;border:2px solid var(--gold)">
    <h2 style="font-family:'Bebas Neue';font-size:2rem;color:var(--primary);margin-bottom:25px"><i class="fas fa-plus"></i> Novo Produto</h2>

    <div class="form-group">
      <label>Nome:</label>
      <input type="text" id="newProdName" placeholder="Ex: Oversize Tee">
    </div>

    <div class="form-group">
      <label>Categoria:</label>
      <select id="newProdCategory">
        <option value="camiseta">Camiseta</option>
        <option value="shorts">Shorts</option>
        <option value="frio">Roupas de Frio</option>
        <option value="tenis">Tênis</option>
        <option value="chinelo">Chinelo</option>
      </select>
    </div>

    <div class="form-group">
      <label>Preço (R$):</label>
      <input type="number" id="newProdPrice" placeholder="189.90" step="0.01" min="0">
    </div>

    <div class="form-group">
      <label>Image URL:</label>
      <input type="url" id="newProdImage" placeholder="https://...">
    </div>

    <div class="form-group">
      <label>Ícone:</label>
      <select id="newProdIcon">
        <option value="fa-shirt">Camiseta</option>
        <option value="fa-hoodie">Hoodie</option>
        <option value="fa-pants">Calça</option>
       <option value="fa-vest">Jaqueta</option>
        <option value="fa-shorts">Shorts</option>
        <option value="fa-shoe-prints">Tênis</option>
        <option value="fa-flip-flop">Chinelo</option>
      </select>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="addProduct()"><i class="fas fa-save"></i> Adicionar</button>
      <button class="btn btn-danger" onclick="closeProductModal()"><i class="fas fa-times"></i> Cancelar</button>
    </div>
  </div>
</div>

<script>
function loadProducts() {
  const saved = localStorage.getItem('coelhoProducts');
  const products = saved ? JSON.parse(saved) : [
    {id:1,name:'Oversize Tee Preta',category:'camiseta',price:189,image:'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500',icon:'fa-shirt'},
    {id:2,name:'Camiseta Estampada',category:'camiseta',price:159,image:'https://images.unsplash.com/photo-1503341455253-b2e723bb3433?w=500',icon:'fa-shirt'},
    {id:3,name:'Hoodie Cargo Cinza',category:'frio',price:299,image:'https://images.unsplash.com/photo-1587563871167-1ee9c731a7f0?w=500',icon:'fa-hoodie'},
    {id:4,name:'Jaqueta Bomber',category:'frio',price:449,image:'https://images.unsplash.com/photo-1591047990852-258ad828e9b9?w=500',icon:'fa-vest'},
    {id:5,name:'Cargo Pants Preta',category:'shorts',price:249,image:'https://images.unsplash.com/photo-1542272604-787c3835535d?w=500',icon:'fa-pants'},
    {id:6,name:'Shorts Jeans',category:'shorts',price:129,image:'https://images.unsplash.com/photo-1591195853828-11db59a44f6b?w=500',icon:'fa-shorts'},
    {id:7,name:'Tênis Casual Preto',category:'tenis',price:399,image:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500',icon:'fa-shoe-prints'},
    {id:8,name:'Tênis Urbano Branco',category:'tenis',price:379,image:'https://images.unsplash.com/photo-1460353581641-37baddab0fa2?w=500',icon:'fa-shoe-prints'},
    {id:9,name:'Chinelo Estilo',category:'chinelo',price:79,image:'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=500',icon:'fa-flip-flop'},
    {id:10,name:'Chinelo Conforto',category:'chinelo',price:89,image:'https://images.unsplash.com/photo-1591195853828-11db59a44f6b?w=500',icon:'fa-flip-flop'},
  ];
  
  const list = document.getElementById('productsList');
  list.innerHTML = products.map(p => `
    <div class="product-item">
      <img src="${p.image}" class="product-img" onerror="this.src='https://via.placeholder.com/120'">
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-details"><strong>R$ ${p.price.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</strong> | ${p.category}</div>
        <div class="product-actions">
          <button class="btn btn-primary btn-small" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i> Editar</button>
          <button class="btn btn-danger btn-small" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i> Deletar</button>
        </div>
      </div>
    </div>
  `).join('');
}

function changeTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
}

function showNewProductForm() {
  document.getElementById('productModal').style.display = 'block';
}

function closeProductModal() {
  document.getElementById('productModal').style.display = 'none';
}

function addProduct() {
  const name = document.getElementById('newProdName').value;
  const category = document.getElementById('newProdCategory').value;
  const price = parseFloat(document.getElementById('newProdPrice').value);
  const image = document.getElementById('newProdImage').value;
  const icon = document.getElementById('newProdIcon').value;

  if (!name || !price || !image) {
    alert('Preencha todos os campos!');
    return;
  }

  const saved = JSON.parse(localStorage.getItem('coelhoProducts') || '[]');
  const id = saved.length > 0 ? Math.max(...saved.map(p => p.id)) + 1 : 1;
  
  saved.push({id, name, category, price, image, icon});
  localStorage.setItem('coelhoProducts', JSON.stringify(saved));
  
  closeProductModal();
  loadProducts();
  alert('Produto adicionado!');
}

function deleteProduct(id) {
  if (!confirm('Deletar este produto?')) return;
  let saved = JSON.parse(localStorage.getItem('coelhoProducts') || '[]');
  saved = saved.filter(p => p.id !== id);
  localStorage.setItem('coelhoProducts', JSON.stringify(saved));
  loadProducts();
}

function updateColors() {
  localStorage.setItem('coelhoColors', JSON.stringify({
    primary: document.getElementById('colorPrimary').value,
    gold: document.getElementById('colorGold').value
  }));
  showAlert('colorAlert', 'Cores atualizadas!', 'success');
}

function updateHero() {
  localStorage.setItem('coelhoHero', JSON.stringify({
    title: document.getElementById('heroTitle').value,
    subtitle: document.getElementById('heroSubtitle').value
  }));
  showAlert('heroAlert', 'Hero atualizado!', 'success');
}

function updateCategories() {
  localStorage.setItem('coelhoCategories', document.getElementById('categories').value);
  showAlert('catAlert', 'Categorias atualizadas! Recarregue a loja.', 'warning');
}

function saveSettings() {
  localStorage.setItem('coelhoStoreName', document.getElementById('storeName').value);
  alert('Salvo!');
}

function exportData() {
  alert('Dados exportados no console. Copie e salve.');
  console.log(localStorage);
}

function resetAll() {
  if (!confirm('⚠️ DELETAR TUDO?')) return;
  localStorage.clear();
  location.reload();
}

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 3000);
}

loadProducts();
</script>
</body>
</html><!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Coelho Style</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#000;color:#fff;overflow-x:hidden}
:root{--primary:#ff1744;--gold:#ffd700;--accent:#111;--text:#fff;--red:#ff4444}

.admin-container{min-height:100vh;padding:40px 30px;background:var(--accent)}
.admin-header{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;margin-bottom:60px;padding-bottom:30px;border-bottom:2px solid var(--gold)}
.admin-title{font-family:'Bebas Neue';font-size:3rem;letter-spacing:4px;background:linear-gradient(135deg,var(--primary),var(--gold));background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.back-btn{display:flex;align-items:center;gap:10px;padding:12px 20px;background:var(--primary);color:#000;border:none;border-radius:20px;cursor:pointer;font-weight:600;font-family:'Bebas Neue';font-size:1rem;letter-spacing:1px;transition:all 0.3s;text-decoration:none}
.back-btn:hover{transform:scale(1.05);box-shadow:0 10px 30px rgba(255,23,68,0.4)}

.products-container{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:40px}

.product-editor{padding:40px;background:var(--accent);border-radius:25px;border:2px solid var(--gold);box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.editor-title{font-family:'Bebas Neue';font-size:2.2rem;color:var(--primary);margin-bottom:30px;letter-spacing:2px}
.form-group{display:flex;flex-direction:column;gap:10px;margin-bottom:25px}
.form-group label{font-weight:600;color:#ccc;font-size:1rem}
.form-group input{padding:15px 20px;background:#222;border:1px solid var(--gold);border-radius:15px;color:var(--text);font-size:1rem;transition:all 0.3s;font-family:'Poppins'}
.form-group input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 20px rgba(255,23,68,0.3)}
.form-group textarea{padding:15px 20px;background:#222;border:1px solid var(--gold);border-radius:15px;color:var(--text);font-size:1rem;resize:vertical;min-height:100px;font-family:'Poppins'}
.form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 20px rgba(255,23,68,0.3)}

.save-btn{width:100%;padding:18px;background:linear-gradient(135deg,var(--primary),var(--red));color:#000;border:none;border-radius:20px;font-family:'Bebas Neue';font-size:1.2rem;font-weight:600;letter-spacing:2px;cursor:pointer;transition:all 0.3s;box-shadow:0 10px 30px rgba(255,23,68,0.4);margin-bottom:20px}
.save-btn:hover{transform:translateY(-3px);box-shadow:0 15px 40px rgba(255,23,68,0.6)}

.product-preview{margin-top:30px;padding:25px;background:#111;border-radius:15px;border-left:4px solid var(--gold)}
.preview-title{font-weight:600;margin-bottom:15px;color:var(--gold);font-size:1.1rem}
.preview-content{color:#ddd;line-height:1.6;font-size:1rem}
.preview-line{margin-bottom:10px;display:flex;justify-content:space-between}
.preview-label{color:var(--gold);font-weight:600}

.add-product-btn{position:fixed;bottom:40px;right:40px;width:70px;height:70px;background:linear-gradient(135deg,var(--primary),var(--red));border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;color:#000;cursor:pointer;box-shadow:0 10px 40px rgba(255,23,68,0.5);transition:all 0.3s;z-index:100}
.add-product-btn:hover{transform:scale(1.1);box-shadow:0 15px 50px rgba(255,23,68,0.7)}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:2000;justify-content:center;align-items:center;padding:20px}
.modal-content{background:var(--accent);border:2px solid var(--gold);border-radius:25px;padding:40px;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.8)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding-bottom:20px;border-bottom:2px solid var(--gold)}
.modal-title{font-family:'Bebas Neue';font-size:1.8rem;color:var(--primary);letter-spacing:2px}
.close-modal{font-size:30px;cursor:pointer;color:var(--gold);transition:all 0.3s}
.close-modal:hover{color:var(--primary)}

@media(max-width:768px){
.admin-header{flex-direction:column;gap:20px;align-items:flex-start}
.products-container{grid-template-columns:1fr}
.add-product-btn{width:60px;height:60px;font-size:30px;bottom:20px;right:20px}
}
</style>
</head>
<body>

<div class="admin-container">
<div class="admin-header">
<h1 class="admin-title">
<i class="fas fa-cog"></i> Painel Admin
</h1>
<a href="index.html" class="back-btn">
<i class="fas fa-arrow-left"></i> Ir para Loja
</a>
</div>

<div class="products-container" id="productsContainer">
<!-- Produtos serão carregados aqui -->
</div>
</div>

<!-- Modal para adicionar produto -->
<div class="modal" id="addProductModal">
<div class="modal-content">
<div class="modal-header">
<h2 class="modal-title">Novo Produto</h2>
<i class="fas fa-times close-modal" onclick="closeModal()"></i>
</div>
<div class="form-group">
<label>Nome:</label>
<input type="text" id="newProdName" placeholder="Ex: Oversize Tee">
</div>
<div class="form-group">
<label>Preço (R$):</label>
<input type="number" id="newProdPrice" placeholder="189" step="0.01">
</div>
<div class="form-group">
<label>Imagem URL:</label>
<input type="url" id="newProdImage" placeholder="https://...">
</div>
<div class="form-group">
<label>Ícone (Font Awesome):</label>
<input type="text" id="newProdIcon" placeholder="fa-shirt" value="fa-shirt">
</div>
<button class="save-btn" onclick="addProduct()">Adicionar Produto</button>
</div>
</div>

<!-- Botão flutuante para adicionar produto -->
<button class="add-product-btn" onclick="openModal()" title="Adicionar novo produto">
<i class="fas fa-plus"></i>
</button>

<script>
// Dados dos produtos
let products = [
{id: 1, name: 'Oversize Tee', price: 189, image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500', icon: 'fa-shirt'},
{id: 2, name: 'Hoodie Cargo', price: 299, image: 'https://images.unsplash.com/photo-1587563871167-1ee9c731a7f0?w=500', icon: 'fa-hoodie'},
{id: 3, name: 'Cargo Pants', price: 249, image: 'https://images.unsplash.com/photo-1542272604-787c3835535d?w=500', icon: 'fa-pants'}
];

// Carregar produtos do localStorage
function loadProducts() {
const saved = localStorage.getItem('coelhoProducts');
if (saved) products = JSON.parse(saved);
renderProducts();
}

// Renderizar produtos
function renderProducts() {
const container = document.getElementById('productsContainer');
container.innerHTML = products.map(product => `
<div class="product-editor">
<h3 class="editor-title">${product.name}</h3>
<div class="form-group">
<label>Nome:</label>
<input type="text" value="${product.name}" onchange="updateProduct(${product.id}, 'name', this.value)">
</div>
<div class="form-group">
<label>Preço (R$):</label>
<input type="number" value="${product.price}" step="0.01" onchange="updateProduct(${product.id}, 'price', parseFloat(this.value))">
</div>
<div class="form-group">
<label>Imagem URL:</label>
<input type="url" value="${product.image}" onchange="updateProduct(${product.id}, 'image', this.value)">
</div>
<div class="form-group">
<label>Ícone (Font Awesome):</label>
<input type="text" value="${product.icon}" onchange="updateProduct(${product.id}, 'icon', this.value)">
</div>
<button class="save-btn" onclick="saveProduct(${product.id})">Salvar Alterações</button>
<button class="save-btn" style="background:linear-gradient(135deg,#666,#444)" onclick="deleteProduct(${product.id})">
<i class="fas fa-trash"></i> Deletar
</button>
<div class="product-preview">
<div class="preview-title">Pré-visualização:</div>
<div class="preview-content">
<div class="preview-line">
<span class="preview-label">Nome:</span>
<span>${product.name}</span>
</div>
<div class="preview-line">
<span class="preview-label">Preço:</span>
<span>R$ ${product.price.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
</div>
<div class="preview-line">
<span class="preview-label">Ícone:</span>
<span><i class="fas ${product.icon}"></i></span>
</div>
</div>
</div>
</div>
`).join('');
}

// Atualizar produto em tempo real
function updateProduct(id, field, value) {
const product = products.find(p => p.id === id);
if (product) {
product[field] = value;
}
}

// Salvar produto
function saveProduct(id) {
localStorage.setItem('coelhoProducts', JSON.stringify(products));
alert('✅ Produto salvo com sucesso!');
}

// Deletar produto
function deleteProduct(id) {
if (confirm('Tem certeza que quer deletar este produto?')) {
products = products.filter(p => p.id !== id);
localStorage.setItem('coelhoProducts', JSON.stringify(products));
renderProducts();
alert('❌ Produto deletado!');
}
}

// Abrir modal
function openModal() {
document.getElementById('addProductModal').style.display = 'flex';
}

// Fechar modal
function closeModal() {
document.getElementById('addProductModal').style.display = 'none';
}

// Adicionar novo produto
function addProduct() {
const name = document.getElementById('newProdName').value;
const price = parseFloat(document.getElementById('newProdPrice').value);
const image = document.getElementById('newProdImage').value;
const icon = document.getElementById('newProdIcon').value;

if (!name || !price || !image) {
alert('Preencha todos os campos!');
return;
}

const newId = Math.max(...products.map(p => p.id), 0) + 1;
products.push({id: newId, name, price, image, icon});
localStorage.setItem('coelhoProducts', JSON.stringify(products));

// Limpar formulário
document.getElementById('newProdName').value = '';
document.getElementById('newProdPrice').value = '';
document.getElementById('newProdImage').value = '';
document.getElementById('newProdIcon').value = 'fa-shirt';

closeModal();
renderProducts();
alert('✅ Produto adicionado!');
}

// Fechar modal ao clicar fora
document.getElementById('addProductModal').addEventListener('click', (e) => {
if (e.target.id === 'addProductModal') closeModal();
});

// Inicializar
document.addEventListener('DOMContentLoaded', loadProducts);
</script>
</body>
</html>
